services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: insurance_ops
      POSTGRES_USER: insurance
      POSTGRES_PASSWORD: insurance
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://insurance:insurance@postgres:5432/insurance_ops
      LOCAL_STORAGE_ROOT: /app/uploads
    ports:
      - "8002:8000"
    volumes:
      - ./backend:/app
      - backend_uploads:/app/uploads
    depends_on:
      - postgres
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8002/api/v1
    ports:
      - "3002:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev

volumes:
  postgres_data:
  backend_uploads:
